[honeypot]
# Hostname the attacker sees when they log in
hostname = bank-srv-01

# Fake OS — looks like a real Ubuntu server
kernel_version = 5.15.0-91-generic
kernel_build_string = #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023

# Accept any username/password after a few failed attempts
# This keeps the attacker engaged longer
auth_class = AuthRandom
auth_class_parameters = 1,5,10
# ^ means: succeed after 1 to 5 attempts, max 10 attempts before lockout

[ssh]
version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.11
listen_addr = 0.0.0.0
listen_port = 2222

[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json

[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.log
