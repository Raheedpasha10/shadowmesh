<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111E"/>
      <stop offset="1" stop-color="#10213A"/>
    </linearGradient>
    <style>
      .pixel { shape-rendering: crispEdges; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
    </style>
  </defs>

  <rect width="1280" height="360" rx="26" fill="url(#bg2)"/>
  <rect x="20" y="20" width="1240" height="320" rx="20" fill="none" stroke="#29406F"/>

  <text x="52" y="64" fill="#F5FBFF" class="mono" font-size="28">ShadowMesh Live Loop</text>
  <text x="52" y="92" fill="#83AFFF" class="mono" font-size="15">pixel-styled view of the SSH-first adaptive demo path</text>

  <g class="pixel">
    <rect x="56" y="132" width="210" height="150" rx="18" fill="#0F1C33" stroke="#315DA8"/>
    <text x="84" y="165" fill="#FFCE6B" class="mono" font-size="18">1. attacker session</text>
    <text x="84" y="198" fill="#DCE8FF" class="mono" font-size="14">ssh login success</text>
    <text x="84" y="222" fill="#DCE8FF" class="mono" font-size="14">cat /etc/passwd</text>
    <text x="84" y="246" fill="#DCE8FF" class="mono" font-size="14">cat /etc/shadow</text>

    <rect x="320" y="132" width="210" height="150" rx="18" fill="#0F1C33" stroke="#315DA8"/>
    <text x="346" y="165" fill="#7EE7C8" class="mono" font-size="18">2. adaptive bait</text>
    <text x="346" y="198" fill="#DCE8FF" class="mono" font-size="14">show_fake_credentials</text>
    <text x="346" y="222" fill="#DCE8FF" class="mono" font-size="14">backupsvc + cloudsync</text>
    <text x="346" y="246" fill="#DCE8FF" class="mono" font-size="14">next-session materialized</text>

    <rect x="584" y="132" width="290" height="150" rx="18" fill="#0F1C33" stroke="#315DA8"/>
    <text x="612" y="165" fill="#8ED5FF" class="mono" font-size="18">3. attacker follows bait</text>
    <text x="612" y="198" fill="#DCE8FF" class="mono" font-size="14">grep -E 'backupsvc|cloudsync'</text>
    <text x="612" y="222" fill="#DCE8FF" class="mono" font-size="14">command count increases</text>
    <text x="612" y="246" fill="#DCE8FF" class="mono" font-size="14">bait_access_sessions goes up</text>

    <rect x="928" y="132" width="290" height="150" rx="18" fill="#0F1C33" stroke="#315DA8"/>
    <text x="956" y="165" fill="#FF8CA1" class="mono" font-size="18">4. evidence output</text>
    <text x="956" y="198" fill="#DCE8FF" class="mono" font-size="14">honeypot-sessions</text>
    <text x="956" y="222" fill="#DCE8FF" class="mono" font-size="14">honeypot-rl-actions</text>
    <text x="956" y="246" fill="#DCE8FF" class="mono" font-size="14">rules + policy comparison</text>

    <path d="M266 206H320" stroke="#7EE7C8" stroke-width="6" stroke-linecap="round"/>
    <path d="M530 206H584" stroke="#7EE7C8" stroke-width="6" stroke-linecap="round"/>
    <path d="M874 206H928" stroke="#7EE7C8" stroke-width="6" stroke-linecap="round"/>

    <rect x="145" y="198" width="10" height="10" fill="#7EE7C8">
      <animate attributeName="x" values="145;402;674;1024" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="3.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
